server {
    listen 80;
    server_name udriving.com.br www.udriving.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name udriving.com.br www.udriving.com.br;

    ssl_certificate /etc/letsencrypt/live/udriving.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/udriving.com.br/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
}
